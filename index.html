<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTH • NEURAL LINK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');

        :root {
            --green: #00FF41;
            --amber: #FFB800;
            --bg: #0A0F0A;
            --panel: rgba(10, 20, 12, 0.88);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'VT323', 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hud {
            width: 92%;
            max-width: 480px;
            padding: 16px;
        }

        .header {
            font-size: 22px;
            color: var(--green);
            letter-spacing: 3px;
            margin-bottom: 14px;
            text-align: center;
        }

        .vitals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            background: var(--panel);
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 10px;
            padding: 14px 16px;
            backdrop-filter: blur(12px);
        }

        .metric-label {
            font-size: 11px;
            color: #A0B0A0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 32px;
            color: var(--green);
            line-height: 1;
        }

        .footer {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        button {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 20px;
            border-radius: 9999px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
        }

        button:active {
            background: rgba(0, 255, 65, 0.1);
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="header">SYNTH • NEURAL LINK</div>
        
        <div class="vitals">
            <div class="metric">
                <div class="metric-label">READINESS</div>
                <div class="metric-value" id="readiness">87</div>
            </div>
            <div class="metric">
                <div class="metric-label">SLEEP</div>
                <div class="metric-value" id="sleep">82</div>
            </div>
            <div class="metric">
                <div class="metric-label">HRV</div>
                <div class="metric-value" id="hrv">68</div>
            </div>
            <div class="metric">
                <div class="metric-label">RESTING HR</div>
                <div class="metric-value" id="resting-hr">62</div>
            </div>
        </div>
        
        <div class="footer">
            <button onclick="refreshData()">REFRESH</button>
        </div>
    </div>

    <script>
        function refreshData() {
            document.getElementById('readiness').textContent = Math.floor(75 + Math.random() * 25);
            document.getElementById('sleep').textContent = Math.floor(70 + Math.random() * 30);
            document.getElementById('hrv').textContent = Math.floor(50 + Math.random() * 40);
            document.getElementById('resting-hr').textContent = Math.floor(55 + Math.random() * 15);
            console.log("SYNTH refreshed");
        }

        // Auto refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
