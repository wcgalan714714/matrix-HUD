<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNTH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&amp;family=Inter:wght@400;500&amp;display=swap');

        :root {
            --green: #00FF41;
            --amber: #FFB800;
            --alert: #FF3B5C;
            --bg: #0A0F0A;
            --panel: rgba(10, 20, 12, 0.88);
            --text: #FFFFFF;
            --text-muted: #A0B0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hud {
            width: 92%;
            max-width: 520px;
            padding: 18px 16px;
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 6px;
        }

        .logo {
            font-family: 'VT323', monospace;
            font-size: 26px;
            color: var(--green);
            letter-spacing: 5px;
        }

        .status {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
        }

        .vitals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 11px;
        }

        .vital-card {
            background: var(--panel);
            border: 1px solid rgba(0, 255, 65, 0.22);
            border-radius: 11px;
            padding: 15px 17px;
            backdrop-filter: blur(14px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .vital-card:active {
            transform: scale(0.985);
        }

        .vital-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .vital-value {
            font-family: 'VT323', monospace;
            font-size: 34px;
            color: var(--green);
            line-height: 1;
        }

        .vital-unit {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 3px;
        }

        .vital-meta {
            font-size: 10px;
            color: var(--amber);
            margin-top: 5px;
            min-height: 14px;
        }

        .footer {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6px;
        }

        .last-sync {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'VT323', monospace;
        }

        .sync-btn {
            font-family: 'VT323', monospace;
            background: transparent;
            color: var(--green);
            border: 1px solid var(--green);
            padding: 9px 24px;
            font-size: 14px;
            letter-spacing: 2.5px;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sync-btn:active {
            background: rgba(0, 255, 65, 0.12);
            transform: scale(0.97);
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 4px,
                rgba(0, 255, 65, 0.028) 4px,
                rgba(0, 255, 65, 0.028) 5px
            );
            pointer-events: none;
            z-index: 5;
            animation: scan 5.5s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
    </style>
</head>
<body>
    <div class="hud">
        <!-- Header -->
        <div class="header">
            <div class="logo">SYNTH</div>
            <div class="status" id="status">OUR A 5 • LINKED</div>
        </div>

        <!-- Vitals -->
        <div class="vitals-grid">
            <div class="vital-card">
                <div class="vital-label">READINESS</div>
                <div><span class="vital-value" id="readiness">87</span></div>
                <div class="vital-meta" id="readiness-meta">Optimal</div>
            </div>
            <div class="vital-card">
                <div class="vital-label">SLEEP</div>
                <div><span class="vital-value" id="sleep">82</span></div>
                <div class="vital-meta" id="sleep-meta">Last night</div>
            </div>
            <div class="vital-card">
                <div class="vital-label">HRV</div>
                <div><span class="vital-value" id="hrv">68</span><span class="vital-unit">ms</span></div>
                <div class="vital-meta" id="hrv-meta">Excellent recovery</div>
            </div>
            <div class="vital-card">
                <div class="vital-label">RESTING HR</div>
                <div><span class="vital-value" id="hr">62</span><span class="vital-unit">bpm</span></div>
                <div class="vital-meta" id="hr-meta">↑ 3 from avg</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="last-sync" id="last-sync">LAST SYNC: JUST NOW</div>
            <button class="sync-btn" onclick="refreshData()">SYNC</button>
        </div>
    </div>

    <!-- Subtle scanline -->
    <div class="scanline"></div>

    <script>
        function updateTimestamp() {
            const el = document.getElementById('last-sync');
            const now = new Date();
            el.textContent = `LAST SYNC: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        }

        function refreshData() {
            const btn = event.currentTarget;
            
            // Simulate realistic data variation
            document.getElementById('readiness').textContent = Math.floor(78 + Math.random() * 20);
            document.getElementById('sleep').textContent = Math.floor(72 + Math.random() * 25);
            document.getElementById('hrv').textContent = Math.floor(52 + Math.random() * 35);
            document.getElementById('hr').textContent = Math.floor(56 + Math.random() * 14);

            // Gentle amber flash on update
            const values = document.querySelectorAll('.vital-value');
            values.forEach(v => {
                v.style.transition = 'none';
                v.style.color = '#FFB800';
                setTimeout(() => {
                    v.style.transition = 'color 650ms ease';
                    v.style.color = '#00FF41';
                }, 60);
            });

            updateTimestamp();
        }

        // Initial timestamp
        updateTimestamp();

        // Gentle auto-refresh every 45 seconds (respectful of battery)
        setInterval(() => {
            // Only auto-refresh if tab is visible
            if (!document.hidden) {
                const values = document.querySelectorAll('.vital-value');
                values.forEach(v => {
                    v.style.transition = 'none';
                    v.style.color = '#FFB800';
                    setTimeout(() => {
                        v.style.transition = 'color 800ms ease';
                        v.style.color = '#00FF41';
                    }, 40);
                });
                updateTimestamp();
            }
        }, 45000);
    </script>
</body>
</html>
